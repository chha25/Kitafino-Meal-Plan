name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version without v (for example, 1.0.0)"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Require the main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "Releases must be started from the main branch."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest

      - name: Validate release version
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "Invalid release version: $RELEASE_VERSION"
            exit 1
          fi

          manifest_version="$(jq -r '.version' custom_components/speiseplan/manifest.json)"
          hacs_version="$(jq -r '.version' hacs.json)"
          if [[ "$manifest_version" != "$RELEASE_VERSION" || "$hacs_version" != "$RELEASE_VERSION" ]]; then
            echo "Release version: $RELEASE_VERSION"
            echo "manifest.json version: $manifest_version"
            echo "hacs.json version: $hacs_version"
            exit 1
          fi

  release:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: >-
          gh release create "v${RELEASE_VERSION}"
          --target "${{ github.sha }}"
          --title "v${RELEASE_VERSION}"
          --generate-notes
